<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Application</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  :root{
    --ivory: #faf6ee;
    --paper: #fffdf8;
    --ink: #2b2620;
    --ink-soft: #5c5346;
    --rule: #ddd2bd;
    --maroon: #7a2e2e;
    --maroon-dark: #5e2222;
    --gold: #b08d57;
    --user-bg: #efe6d3;
    --code-bg: #2b2620;
    --code-ink: #f3ead9;
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
    margin: 0;
  }

  body{
    background: var(--ivory);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(122,46,46,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    font-family: "Palatino Linotype", "Book Antiqua", Georgia, "Times New Roman", serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 24px;
    min-height: 100%;
  }

  header{
    width: 100%;
    max-width: 820px;
    text-align: center;
    margin-bottom: 22px;
  }

  header .eyebrow{
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--gold);
    font-family: Georgia, serif;
  }

  header h1{
    margin: 6px 0 4px;
    font-size: 34px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--maroon-dark);
  }

  header .rule{
    width: 120px;
    height: 2px;
    margin: 14px auto 0;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  #chatBox{
    width: 100%;
    max-width: 820px;
    height: 60vh;
    min-height: 380px;
    overflow-y: auto;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 26px 28px;
    box-shadow: 0 6px 24px rgba(43,38,32,0.08);
    margin-bottom: 18px;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }

  #chatBox::-webkit-scrollbar{ width: 8px; }
  #chatBox::-webkit-scrollbar-thumb{ background: var(--rule); border-radius: 4px; }

  .placeholder{
    color: var(--ink-soft);
    font-style: italic;
    text-align: center;
    margin-top: 40px;
    font-size: 15px;
  }

  .msg-row{
    display: flex;
    margin: 16px 0;
  }

  .msg-row.user{ justify-content: flex-end; }
  .msg-row.ai{ justify-content: flex-start; }

  .bubble{
    max-width: 82%;
    padding: 13px 18px;
    border-radius: 4px;
    line-height: 1.6;
    font-size: 16px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg-row.user .bubble{
    background: var(--user-bg);
    border: 1px solid var(--rule);
    border-top-right-radius: 0;
    color: var(--ink);
  }

  .msg-row.ai .bubble{
    background: var(--paper);
    border-left: 3px solid var(--maroon);
    border-top-left-radius: 0;
    padding-left: 16px;
    color: var(--ink);
  }

  .sender-label{
    display: block;
    font-family: Georgia, serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 5px;
  }

  .msg-row.user .sender-label{ text-align: right; color: var(--ink-soft); }

  .bubble h1, .bubble h2, .bubble h3{
    font-family: Georgia, serif;
    font-weight: 700;
    color: var(--maroon-dark);
    margin: 14px 0 6px;
    line-height: 1.3;
  }
  .bubble h1{ font-size: 1.5em; border-bottom: 1px solid var(--rule); padding-bottom: 4px; }
  .bubble h2{ font-size: 1.28em; }
  .bubble h3{ font-size: 1.12em; color: var(--maroon); }
  .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child{ margin-top: 0; }

  .bubble p{ margin: 8px 0; }
  .bubble strong{ color: var(--maroon-dark); font-weight: 700; }
  .bubble em{ font-style: italic; }

  .bubble ul, .bubble ol{
    margin: 6px 0 10px;
    padding-left: 22px;
  }
  .bubble li{ margin: 3px 0; }

  .bubble hr{
    border: none;
    border-top: 1px solid var(--rule);
    margin: 14px 0;
  }

  .bubble code:not(pre code){
    background: #eee3cf;
    color: var(--maroon-dark);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.92em;
  }

  .code-block{
    position: relative;
    margin: 10px 0;
  }

  .code-block .lang-tag{
    position: absolute;
    top: 8px;
    left: 14px;
    font-family: Georgia, serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a8370;
  }

  pre{
    background: var(--code-bg);
    color: var(--code-ink);
    padding: 14px 16px;
    padding-top: 34px;
    border-radius: 4px;
    overflow-x: auto;
    font-family: "Fira Code", "Courier New", Courier, monospace;
    font-size: 13.5px;
    line-height: 1.6;
    margin: 0;
    border: 1px solid #1a1712;
  }

  code{
    font-family: "Fira Code", "Courier New", Courier, monospace;
  }

  /* Syntax highlight token colors (VS Code "Dark+" inspired) */
  .tok-keyword{ color: #c586c0; }
  .tok-string{ color: #ce9178; }
  .tok-comment{ color: #6a9955; font-style: italic; }
  .tok-number{ color: #b5cea8; }
  .tok-function{ color: #dcdcaa; }
  .tok-builtin{ color: #4ec9b0; }
  .tok-property{ color: #9cdcfe; }
  .tok-tag{ color: #569cd6; }
  .tok-punct{ color: #d4d4d4; }

  .copy-btn{
    position: absolute;
    top: 6px;
    right: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 9px;
    font-family: Georgia, serif;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.04);
    color: var(--code-ink);
    border: 1px solid #55503f;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0.75;
    transition: opacity 0.15s ease, background 0.15s ease;
  }

  .copy-btn svg{
    width: 13px;
    height: 13px;
    flex-shrink: 0;
  }

  .copy-btn:hover{
    opacity: 1;
    background: rgba(255,255,255,0.1);
  }

  .copy-btn.copied{
    opacity: 1;
    border-color: var(--gold);
    color: var(--gold);
  }

  .cursor-blink::after{
    content: "▍";
    animation: blink 1s step-start infinite;
    color: var(--maroon);
  }

  @keyframes blink{ 50% { opacity: 0; } }

  form#composer{
    width: 100%;
    max-width: 820px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 14px;
    box-shadow: 0 6px 24px rgba(43,38,32,0.08);
  }

  textarea{
    width: 100%;
    min-height: 64px;
    max-height: 200px;
    padding: 10px 12px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: var(--ivory);
    color: var(--ink);
    font-family: inherit;
    font-size: 15.5px;
    resize: vertical;
    outline: none;
  }

  textarea:focus{
    border-color: var(--maroon);
    box-shadow: 0 0 0 3px rgba(122,46,46,0.08);
  }

  .composer-footer{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .hint{
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .hint kbd{
    font-family: Georgia, serif;
    font-style: normal;
    background: var(--ivory);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
  }

  button#sendBtn{
    padding: 10px 26px;
    border: 1px solid var(--maroon-dark);
    background: var(--maroon);
    color: var(--ivory);
    border-radius: 4px;
    font-family: Georgia, serif;
    letter-spacing: 0.06em;
    font-size: 13px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  button#sendBtn:hover{ background: var(--maroon-dark); }
  button#sendBtn:disabled{ opacity: 0.5; cursor: default; }

  footer{
    margin-top: 16px;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Correspondence with</div>
  <h1>AI Chat Application</h1>
  <div class="rule"></div>
</header>

<div id="chatBox">
  <div class="placeholder" id="placeholder">Begin the conversation below.</div>
</div>

<form id="composer" onsubmit="return false;">
  <textarea id="userInput" placeholder="Write your message..."></textarea>
  <div class="composer-footer">
    <span class="hint"><kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift</kbd> + <kbd>Enter</kbd> for a new line</span>
    <button type="submit" id="sendBtn">Send</button>
  </div>
</form>

<footer>Powered by Claude</footer>

<script>
const chatBox = document.getElementById("chatBox");
const inputBox = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const placeholder = document.getElementById("placeholder");

function escapeHtml(str){
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// --- Lightweight syntax highlighter (no external libraries) ---
function highlightCode(code){
  const KEYWORDS = /\b(function|return|if|else|for|while|do|switch|case|break|continue|class|extends|new|const|let|var|import|export|from|default|try|catch|finally|throw|async|await|yield|typeof|instanceof|in|of|this|super|null|true|false|undefined|def|elif|except|pass|lambda|with|as|is|not|and|or|None|True|False|self|print|public|private|protected|static|void|int|float|double|string|bool|struct|interface|enum|package|namespace|using)\b/g;
  const BUILTINS = /\b(console|Math|Object|Array|String|Number|Boolean|Promise|JSON|Map|Set|document|window|len|range|list|dict|str|int|float|print)\b/g;

  // Tokenize by first pulling out comments and strings so keyword/number
  // rules never accidentally match inside them.
  const tokens = [];
  let placeholderText = code.replace(
    /(\/\/[^\n]*|#[^\n]*|\/\*[\s\S]*?\*\/)|("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g,
    (match, comment, string) => {
      const idx = tokens.length;
      if (comment !== undefined) {
        tokens.push(`<span class="tok-comment">${comment}</span>`);
      } else {
        tokens.push(`<span class="tok-string">${string}</span>`);
      }
      return `\u0000${idx}\u0000`;
    }
  );

  placeholderText = placeholderText
    .replace(KEYWORDS, '<span class="tok-keyword">$&</span>')
    .replace(BUILTINS, '<span class="tok-builtin">$&</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="tok-number">$1</span>')
    .replace(/\b([a-zA-Z_$][\w$]*)(?=\s*\()/g, '<span class="tok-function">$1</span>');

  return placeholderText.replace(/\u0000(\d+)\u0000/g, (m, idx) => tokens[parseInt(idx, 10)]);
}

const COPY_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
const CHECK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

function formatMessage(text){
  // 1. Pull out fenced code blocks first (and highlight them) so nothing
  //    else touches their contents.
  const codeBlocks = [];
  let working = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
    const cleanCode = code.replace(/\n$/, "");
    const highlighted = highlightCode(escapeHtml(cleanCode));
    const idx = codeBlocks.length;
    codeBlocks.push(
      `<div class="code-block">` +
        (lang ? `<span class="lang-tag">${escapeHtml(lang)}</span>` : "") +
        `<button class="copy-btn" onclick="copyCode(this)" title="Copy code">${COPY_ICON}<span class="copy-label">Copy</span></button>` +
        `<pre><code>${highlighted}</code></pre>` +
      `</div>`
    );
    return `%%CODEBLOCK${idx}%%`;
  });

  // 2. Escape everything else, then re-insert inline code safely.
  const inlineCode = [];
  working = working.replace(/`([^`]+)`/g, (match, code) => {
    const idx = inlineCode.length;
    inlineCode.push(escapeHtml(code));
    return `\u0001${idx}\u0001`;
  });
  working = escapeHtml(working);
  working = working.replace(/\u0001(\d+)\u0001/g, (m, idx) => `<code>${inlineCode[parseInt(idx, 10)]}</code>`);

  // 3. Headings
  working = working.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  working = working.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  working = working.replace(/^# (.*)$/gm, "<h1>$1</h1>");

  // 4. Bold / italic
  working = working.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  working = working.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, "<em>$1</em>");

  // 5. Lists + paragraphs, line by line
  const lines = working.split("\n");
  let html = "";
  let inUl = false, inOl = false;

  const closeLists = () => {
    if (inUl) { html += "</ul>"; inUl = false; }
    if (inOl) { html += "</ol>"; inOl = false; }
  };

  for (const line of lines) {
    const ulMatch = line.match(/^\s*[-*]\s+(.*)$/);
    const olMatch = line.match(/^\s*\d+\.\s+(.*)$/);

    if (ulMatch) {
      if (inOl) { html += "</ol>"; inOl = false; }
      if (!inUl) { html += "<ul>"; inUl = true; }
      html += `<li>${ulMatch[1]}</li>`;
      continue;
    }
    if (olMatch) {
      if (inUl) { html += "</ul>"; inUl = false; }
      if (!inOl) { html += "<ol>"; inOl = true; }
      html += `<li>${olMatch[1]}</li>`;
      continue;
    }

    closeLists();

    if (line.trim() === "---") {
      html += "<hr>";
    } else if (/^%%CODEBLOCK\d+%%$/.test(line.trim())) {
      html += line.trim();
    } else if (/^<h[1-3]>/.test(line)) {
      html += line;
    } else if (line.trim() === "") {
      html += "<br>";
    } else {
      html += `<p>${line}</p>`;
    }
  }
  closeLists();

  // 6. Restore highlighted code blocks
  html = html.replace(/%%CODEBLOCK(\d+)%%/g, (m, idx) => codeBlocks[parseInt(idx, 10)]);

  return html;
}

function copyCode(btn){
  const codeEl = btn.parentElement.querySelector("code");
  const text = codeEl ? codeEl.innerText : "";
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = `${CHECK_ICON}<span class="copy-label">Copied</span>`;
    btn.classList.add("copied");
    setTimeout(() => {
      btn.innerHTML = `${COPY_ICON}<span class="copy-label">Copy</span>`;
      btn.classList.remove("copied");
    }, 1500);
  }).catch(() => {
    btn.innerHTML = `${COPY_ICON}<span class="copy-label">Failed</span>`;
    setTimeout(() => { btn.innerHTML = `${COPY_ICON}<span class="copy-label">Copy</span>`; }, 1500);
  });
}

async function sendMessage(){
  const userText = inputBox.value.trim();
  if (!userText) return;

  if (placeholder) placeholder.remove();

  // User bubble
  const userRow = document.createElement("div");
  userRow.className = "msg-row user";
  userRow.innerHTML = `<div class="bubble"><span class="sender-label">You</span>${formatMessage(userText)}</div>`;
  chatBox.appendChild(userRow);

  inputBox.value = "";
  inputBox.style.height = "";
  sendBtn.disabled = true;
  chatBox.scrollTop = chatBox.scrollHeight;

  // AI bubble
  const aiRow = document.createElement("div");
  aiRow.className = "msg-row ai";
  const aiBubble = document.createElement("div");
  aiBubble.className = "bubble cursor-blink";
  aiBubble.innerHTML = `<span class="sender-label">Claude</span>`;
  aiRow.appendChild(aiBubble);
  chatBox.appendChild(aiRow);
  chatBox.scrollTop = chatBox.scrollHeight;

  let fullText = "";

  try {
    const response = await puter.ai.chat(userText, {
      model: "claude-sonnet-4-6",
      stream: true
    });

    for await (const part of response) {
      if (part?.text) {
        fullText += part.text;
        aiBubble.innerHTML = `<span class="sender-label">Claude</span>` + formatMessage(fullText);
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }
  } catch (err) {
    const details = err?.message || err?.error?.message || String(err);
    aiBubble.innerHTML = `<span class="sender-label">Claude</span>Something went wrong: ${escapeHtml(details)}`;
    console.error(err);
  } finally {
    aiBubble.classList.remove("cursor-blink");
    sendBtn.disabled = false;
  }
}

// Enter to send, Shift+Enter for newline
inputBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener("click", sendMessage);

// Auto-grow textarea
inputBox.addEventListener("input", () => {
  inputBox.style.height = "auto";
  inputBox.style.height = Math.min(inputBox.scrollHeight, 200) + "px";
});
</script>

</body>
</html>
